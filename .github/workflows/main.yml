name: Daily Update

on:
  schedule:
    - cron: '55 0 */3 * *'  # 每3天凌晨00点55分执行任务（上海时区的UTC时间）
  workflow_dispatch:  # 允许手动触发工作流

jobs:
  run_script:
    runs-on: ubuntu-latest

    # 强制所有 JavaScript Actions 使用 Node.js 24 运行（规避 Node 20 弃用问题）
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TZ: Asia/Shanghai  # 设置时区为上海

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4   # 升级到 v4（仍基于 Node 20，但配合环境变量可使用 Node 24）

    - name: Set up Python
      uses: actions/setup-python@v5   # 升级到 v5
      with:
        python-version: '3.10'

    - name: Cache dependencies
      uses: actions/cache@v4   # 保持 v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests aiohttp

    - name: Run Python script
      run: |
        python main.py

    - name: Commit and push if changed
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add -A
        if ! git diff --staged --quiet; then
          git commit -m "Auto-update live files"
          git pull --rebase
          git push
        fi
